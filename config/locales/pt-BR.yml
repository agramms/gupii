    help:
      what_is: "O que são Notificações de Infração PIX?"
      what_is_text: "As notificações de infração PIX são comunicações oficiais enviadas ao sistema JDPI do Banco Central para reportar irregularidades relacionadas a chaves PIX e transações."
      
      when_create: "Quando criar uma notificação?"
      when_create_items:
        - "Suspeita de fraude em transações PIX"
        - "Uso inadequado ou não autorizado de chaves PIX"
        - "Violações de políticas anti-lavagem de dinheiro"
        - "Chaves PIX com formato inválido ou problemático"
        - "Qualquer irregularidade que comprometa a segurança do sistema"
      
      process: "Como funciona o processo?"
      process_steps:
        - "Criação da notificação com dados detalhados"
        - "Envio automático ao sistema DICT do Banco Central"
        - "Análise pela equipe competente"
        - "Decisão sobre medidas cabíveis"
        - "Feedback sobre o resultado da análise"
    
    examples:
      title: "Exemplos de Descrições"
      fraud: "Cliente reportou transação PIX não reconhecida de R$ 500,00 realizada em [data/hora]. Chave PIX utilizada não pertence ao cliente. Evidências: print do extrato e declaração do cliente."
      invalid_key: "Chave PIX cadastrada com formato de email inválido, causando falhas em transações. Email: [exemplo@dominio]. Sistema retorna erro de validação consistentemente."
      unauthorized: "Chave PIX cadastrada sem autorização do titular da conta. Cliente nega ter solicitado o cadastro. Data do cadastro: [data]. Solicitação de cancelamento protocolada."

