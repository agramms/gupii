  # Infraction notifications
  infraction_notifications:
    title: "Notificações de Infração"
    subtitle: "Gerenciamento de notificações de infração PIX"
    new:
      title: "Nova Notificação de Infração"
      subtitle: "Criar nova notificação para o sistema PIX"
      help_title: "Como preencher esta notificação"
      help_text: "Preencha todos os campos obrigatórios com informações precisas. A notificação será enviada automaticamente ao sistema DICT do Banco Central."
    
    fields:
      pix_key:
        label: "Chave PIX"
        placeholder: "Ex: usuario@email.com, +5511999999999, 12345678901, ou UUID"
        help: "Insira a chave PIX relacionada à infração. Pode ser email, telefone, CPF/CNPJ ou chave aleatória (UUID)."
        validation: "A chave PIX deve estar em um formato válido conforme regulamentação do Banco Central."
      
      infraction_type:
        label: "Tipo de Infração"
        help: "Selecione o tipo de infração conforme classificação do Banco Central. Esta informação determina o fluxo de análise."
        validation: "Tipo de infração é obrigatório e deve estar de acordo com as normas JDPI."
      
      created_by:
        label: "Departamento Responsável"
        help: "Identifica qual departamento está criando esta notificação. Esta informação é usada para auditoria e controle interno. Notificações automáticas do sistema DICT não são criadas manualmente."
        validation: "Departamento responsável é obrigatório para rastreabilidade."
      
      description:
        label: "Descrição Detalhada"
        placeholder: "Descreva os detalhes da infração, incluindo evidências, contexto e impacto observado..."
        help: "Forneça uma descrição completa e objetiva da infração. Inclua evidências, contexto temporal, impacto observado e qualquer informação relevante para análise."
        validation: "Descrição é obrigatória e deve ter entre 20 e 500 caracteres. Seja específico e objetivo."
      
      pi_payer_id:
        label: "ID do Pagador"
        placeholder: "ID do pagador envolvido na transação"
        help: "Se aplicável, informe o identificador do pagador envolvido na transação irregular. Campo opcional."
      
      ispb:
        label: "ISPB da Instituição"
        placeholder: "Código ISPB de 8 dígitos"
        help: "Código ISPB da instituição envolvida, se diferente da nossa. Usado para casos de infrações envolvendo múltiplas instituições."
        validation: "Se informado, deve conter exatamente 8 dígitos numéricos."
    
    status:
      submitted: "Submetido"
      processing: "Processando"
      analyzing: "Analisando"
      approved: "Aprovado"
      rejected: "Rejeitado"
      completed: "Concluído"
      cancelled: "Cancelado"
    
