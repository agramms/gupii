  # Infraction notifications
  infraction_notifications:
    title: "Infraction Notifications"
    subtitle: "PIX infraction notification management"
    new:
      title: "New Infraction Notification"
      subtitle: "Create new notification for PIX system"
      help_title: "How to fill out this notification"
      help_text: "Fill in all required fields with accurate information. The notification will be automatically sent to the Central Bank's JDPI system."
    
    fields:
      pix_key:
        label: "PIX Key"
        placeholder: "Ex: user@email.com, +5511999999999, 12345678901, or UUID"
        help: "Enter the PIX key related to the infraction. Can be email, phone, CPF/CNPJ or random key (UUID)."
        validation: "The PIX key must be in a valid format according to Central Bank regulations."
      
      infraction_type:
        label: "Infraction Type"
        help: "Select the infraction type according to Central Bank classification. This information determines the analysis flow."
        validation: "Infraction type is required and must comply with JDPI standards."
      
      created_by:
        label: "Responsible Department"
        help: "Identifies which department is creating this notification. This information is used for auditing and internal control. Automatic DICT system notifications are not created manually."
        validation: "Responsible department is required for traceability."
      
      description:
        label: "Detailed Description"
        placeholder: "Describe the infraction details, including evidence, context and observed impact..."
        help: "Provide a complete and objective description of the infraction. Include evidence, temporal context, observed impact and any relevant information for analysis."
        validation: "Description is required and must be between 20 and 500 characters. Be specific and objective."
      
      pi_payer_id:
        label: "Payer ID (Optional)"
        placeholder: "ID of the payer involved in the transaction"
        help: "If applicable, provide the identifier of the payer involved in the irregular transaction. Optional field."
      
      ispb:
        label: "Institution ISPB (Optional)"
        placeholder: "8-digit ISPB code"
        help: "ISPB code of the involved institution, if different from ours. Used for infractions involving multiple institutions."
        validation: "If provided, must contain exactly 8 numeric digits."
    
    status:
      submitted: "Submitted"
      processing: "Processing"
      analyzing: "Analyzing"
      approved: "Approved"
      rejected: "Rejected"
      completed: "Completed"
      cancelled: "Cancelled"
    
