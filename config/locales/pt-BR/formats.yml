pt-BR:
  # Formatação de números e moeda brasileira
  number:
    format:
      separator: ","
      delimiter: "."
      precision: 2
      significant: false
      strip_insignificant_zeros: false
    
    currency:
      format:
        format: "%u %n"
        unit: "R$"
        separator: ","
        delimiter: "."
        precision: 2
        significant: false
        strip_insignificant_zeros: false
    
    percentage:
      format:
        delimiter: "."
        format: "%n%"
    
    precision:
      format:
        delimiter: "."
    
    human:
      format:
        delimiter: "."
        precision: 3
        significant: true
        strip_insignificant_zeros: true
      storage_units:
        format: "%n %u"
        units:
          byte:
            one: "Byte"
            other: "Bytes"
          kb: "KB"
          mb: "MB"
          gb: "GB"
          tb: "TB"
      decimal_units:
        format: "%n %u"
        units:
          thousand: "mil"
          million: "milhão"
          billion: "bilhão"
          trillion: "trilhão"

  # Formatação de data e hora brasileira
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d de %b"
      long: "%d de %B de %Y"
      
    day_names:
      - domingo
      - segunda-feira
      - terça-feira
      - quarta-feira
      - quinta-feira
      - sexta-feira
      - sábado
    
    abbr_day_names:
      - dom
      - seg
      - ter
      - qua
      - qui
      - sex
      - sáb
    
    month_names:
      - ~
      - janeiro
      - fevereiro
      - março
      - abril
      - maio
      - junho
      - julho
      - agosto
      - setembro
      - outubro
      - novembro
      - dezembro
    
    abbr_month_names:
      - ~
      - jan
      - fev
      - mar
      - abr
      - mai
      - jun
      - jul
      - ago
      - set
      - out
      - nov
      - dez
    
    order:
      - :day
      - :month
      - :year

  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short: "%d de %b às %H:%M"
      long: "%d de %B de %Y às %H:%M"
      time: "%H:%M"
      
    am: ""
    pm: ""

  # Formatação específica para valores PIX
  pix_formats:
    currency:
      # Valores PIX sempre com 2 casas decimais
      format: "R$ %n"
      separator: ","
      delimiter: "."
      precision: 2
    
    # Formatação de identificadores PIX
    cpf: "###.###.###-##"
    cnpj: "##.###.###/####-##"
    phone: "(##) #####-####"
    
    # Formatação de códigos bancários
    bank_code: "###"
    agency: "####"
    account: "#######-#"