# Nginx Configuration for Gupii Local Development
# Provides unified access to all development services via *.gupii.local domains

events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name *.gupii.local;
        return 301 https://$host$request_uri;
    }

    # Main Rails Application - gupii.local
    server {
        listen 443 ssl http2;
        server_name gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
    }

    # Grafana Dashboard - grafana.gupii.local
    server {
        listen 443 ssl http2;
        server_name grafana.gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        location / {
            proxy_pass http://grafana:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
    }

    # Prometheus Metrics - prometheus.gupii.local
    server {
        listen 443 ssl http2;
        server_name prometheus.gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        location / {
            proxy_pass http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
    }

    # pgAdmin Database Admin - pgadmin.gupii.local
    server {
        listen 443 ssl http2;
        server_name pgadmin.gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        location / {
            proxy_pass http://pgadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # pgAdmin specific headers
            proxy_set_header Referer $scheme://$host;
            proxy_redirect off;
            proxy_buffering off;

            # Increase timeouts for pgAdmin
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # MailHog Email Testing - mail.gupii.local
    server {
        listen 443 ssl http2;
        server_name mail.gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        location / {
            proxy_pass http://mailhog:8025;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
    }

    # MinIO S3 API - minio.gupii.local
    server {
        listen 443 ssl http2;
        server_name minio.gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        # Increase client max body size for file uploads
        client_max_body_size 1000M;

        location / {
            proxy_pass http://minio:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # MinIO specific headers
            proxy_connect_timeout 300;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
        }
    }

    # MinIO Console - minio-console.gupii.local
    server {
        listen 443 ssl http2;
        server_name minio-console.gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        location / {
            proxy_pass http://minio:9001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # WebSocket support for MinIO Console
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Graphite Web Interface - graphite.gupii.local
    server {
        listen 443 ssl http2;
        server_name graphite.gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        location / {
            proxy_pass http://graphite:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
    }

    # Jaeger Tracing UI - jaeger.gupii.local
    server {
        listen 443 ssl http2;
        server_name jaeger.gupii.local;

        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;

        location / {
            proxy_pass http://jaeger:16686;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
    }
}