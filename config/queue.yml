default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      concurrency_maintenance_interval: 600
  workers:
    - queues: "*"
      threads: 3
      processes: <%= AppConfig.get_integer("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
      max_execution_time: 600

development:
  <<: *default
  dispatchers:
    - polling_interval: 2
      batch_size: 100
  workers:
    - queues: "*"
      threads: 1
      processes: 1
      polling_interval: 1
      max_execution_time: 300

test:
  <<: *default
  dispatchers:
    - polling_interval: 5
      batch_size: 50
  workers:
    - queues: "*"
      threads: 1
      processes: 1
      polling_interval: 2
      max_execution_time: 60

production:
  <<: *default
  # Production configuration with multiple workers for scale
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      concurrency_maintenance_interval: 300
  workers:
    - queues: "critical,default"
      threads: 5
      processes: <%= AppConfig.get_integer("JOB_CONCURRENCY", 2) %>
      polling_interval: 0.1
      max_execution_time: 900
    - queues: "low_priority"
      threads: 2
      processes: 1
      polling_interval: 5
      max_execution_time: 1800
