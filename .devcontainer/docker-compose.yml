services:
  # Development Application Container
  app:
    image: mcr.microsoft.com/devcontainers/ruby:3.4-bullseye
    restart: unless-stopped
    volumes:
      - ..:/workspaces/gupii:cached
      - app_gems:/usr/local/bundle
    working_dir: /workspaces/gupii
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gupii_development
      REDIS_URL: redis://redis123@redis:6379/0
      RAILS_ENV: development
      BUNDLE_PATH: /usr/local/bundle
    ports:
      - "3000:3000"
    command: bin/dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gupii_network
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gupii_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gupii_network

  # pgAdmin - PostgreSQL Administration
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gupii.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gupii_network

  # Redis - Caching, Sessions, Background Jobs
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gupii_network

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.external-url=https://prometheus.gupii.local/'
      - '--web.route-prefix=/'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - gupii_network

  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_DOMAIN: localhost
      GF_SERVER_HTTP_PORT: 3001
      GF_SERVER_ROOT_URL: https://grafana.gupii.local/
      GF_SERVER_SERVE_FROM_SUB_PATH: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3001"
    depends_on:
      - prometheus
    networks:
      - gupii_network

  # StatsD - Metrics Aggregation
  statsd:
    image: graphiteapp/graphite-statsd:latest
    restart: unless-stopped
    ports:
      - "8080:80"      # Graphite web interface
      - "2003:2003"    # Carbon receiver - plaintext
      - "2004:2004"    # Carbon receiver - pickle
      - "2023:2023"    # Carbon aggregator - plaintext
      - "2024:2024"    # Carbon aggregator - pickle
      - "8125:8125/udp" # StatsD
      - "8126:8126"    # StatsD admin
    volumes:
      - statsd_data:/opt/graphite/storage
    environment:
      GRAPHITE_TIME_ZONE: America/Sao_Paulo
    networks:
      - gupii_network


  # MailHog - Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI
    networks:
      - gupii_network

  # MinIO - S3-Compatible Object Storage
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9002"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_BROWSER_REDIRECT_URL: https://minio.gupii.local/
      MINIO_SERVER_URL: https://minio.gupii.local/api/
      MINIO_CONSOLE_SUBPATH: /
    volumes:
      - minio_data:/data
    ports:
      - "9001:9000"   # API
      - "9002:9002"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gupii_network

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "14250:14250"  # Jaeger collector gRPC
      - "6831:6831/udp" # Jaeger agent UDP
      - "6832:6832/udp" # Jaeger agent UDP
    networks:
      - gupii_network

  # Nginx - Reverse Proxy for Development
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/ssl/certs:ro
      - ./ssl:/etc/ssl/private:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - gupii_network

volumes:
  app_gems:
    driver: local
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  statsd_data:
    driver: local
  minio_data:
    driver: local

networks:
  gupii_network:
    driver: bridge