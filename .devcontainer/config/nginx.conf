events {
    worker_connections 1024;
}

http {
    # Include MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Upstream servers
    upstream rails_app {
        server app:3000;
    }

    upstream grafana {
        server grafana:3001;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    upstream pgadmin {
        server pgadmin:80;
    }

    upstream mailhog {
        server mailhog:8025;
    }

    upstream minio_console {
        server minio:9002;
    }

    upstream jaeger {
        server jaeger:16686;
    }

    # HTTP to HTTPS redirect for all domains
    server {
        listen 80;
        server_name gupii.local *.gupii.local;
        return 301 https://$server_name$request_uri;
    }

    # Main Rails Application - gupii.local
    server {
        listen 443 ssl;
        server_name gupii.local;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        location / {
            proxy_pass http://rails_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Grafana Dashboards - grafana.gupii.local
    server {
        listen 443 ssl;
        server_name grafana.gupii.local;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # WebSocket support for live updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Prometheus Metrics - prometheus.gupii.local
    server {
        listen 443 ssl;
        server_name prometheus.gupii.local;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        location / {
            proxy_pass http://prometheus;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    # SonarQube Community - sonar.gupii.local
    server {
        listen 443 ssl;
        server_name sonar.gupii.local;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        location / {
            proxy_pass http://sonarqube:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # SonarQube specific headers
            proxy_set_header X-Forwarded-Server $host;
            proxy_redirect off;
        }
    }

    # PostgreSQL Admin - pgadmin.gupii.local
    server {
        listen 443 ssl;
        server_name pgadmin.gupii.local;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        location / {
            proxy_pass http://pgadmin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # pgAdmin specific headers
            proxy_set_header X-Script-Name "";
            proxy_redirect off;
        }
    }

    # Email Testing - mail.gupii.local
    server {
        listen 443 ssl;
        server_name mail.gupii.local;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        location / {
            proxy_pass http://mailhog;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # WebSocket support for live email updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # S3 Storage Console - minio.gupii.local
    server {
        listen 443 ssl;
        server_name minio.gupii.local;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        # MinIO Console UI
        location / {
            proxy_pass http://minio_console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # MinIO Console specific settings
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            
            # CORS headers for MinIO
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;
        }
        
        # MinIO API endpoint
        location /api/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    # Distributed Tracing - jaeger.gupii.local
    server {
        listen 443 ssl;
        server_name jaeger.gupii.local;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        location / {
            proxy_pass http://jaeger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
    
    # Fallback server for any other *.gupii.local requests
    server {
        listen 443 ssl default_server;
        server_name _;
        
        ssl_certificate /etc/ssl/certs/gupii.local.crt;
        ssl_certificate_key /etc/ssl/private/gupii.local.key;
        
        location / {
            return 404 "Service not found. Available services: gupii.local, grafana.gupii.local, prometheus.gupii.local, sonar.gupii.local, pgadmin.gupii.local, mail.gupii.local, minio.gupii.local, jaeger.gupii.local";
            add_header Content-Type text/plain;
        }
    }
}