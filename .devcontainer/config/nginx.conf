events {
    worker_connections 1024;
}

http {
    upstream rails_app {
        server app:3000;
    }

    upstream grafana {
        server grafana:3001;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    upstream pgadmin {
        server pgadmin:80;
    }

    upstream mailhog {
        server mailhog:8025;
    }

    upstream minio_console {
        server minio:9001;
    }

    upstream jaeger {
        server jaeger:16686;
    }

    server {
        listen 80;
        server_name localhost;

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /grafana;
            
            # Rewrite redirects for subpath
            proxy_redirect / /grafana/;
        }

        # Prometheus
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect /prometheus/ /prometheus/;
        }

        # pgAdmin
        location /pgadmin/ {
            proxy_pass http://pgadmin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_redirect / /pgadmin/;
        }

        # MailHog
        location /mail/ {
            proxy_pass http://mailhog/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MinIO API - S3 compatible storage API
        location /minio-api/ {
            # Remove /minio-api prefix before passing to MinIO API
            rewrite ^/minio-api/(.*) /$1 break;
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # MinIO Console - with URL rewriting
        location /minio/ {
            # Remove /minio prefix before passing to MinIO console
            rewrite ^/minio/(.*) /$1 break;
            proxy_pass http://minio_console/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Set subpath headers for MinIO console
            proxy_set_header X-Script-Name /minio;
            proxy_set_header X-Forwarded-Prefix /minio;
            
            # Handle redirects to maintain subpath
            proxy_redirect / /minio/;
        }

        # Jaeger
        location /jaeger/ {
            proxy_pass http://jaeger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect / /jaeger/;
            
            # Jaeger-specific headers
            proxy_set_header X-Script-Name /jaeger;
        }

        # Rails Application on /app subpath
        location /app/ {
            # Remove /app prefix before passing to Rails
            rewrite ^/app/(.*) /$1 break;
            proxy_pass http://rails_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Script-Name /app;
        }
        
        # Smart routing for root requests based on context
        location = /manifest.json {
            # Always redirect to MinIO manifest (most likely consumer)
            return 301 /minio/manifest.json;
        }
        
        # Smart root routing based on request context  
        location = / {
            # If request has MinIO-related context
            if ($http_referer ~ "minio") {
                return 302 /minio/;
            }
            # If it's a browser request, redirect to Rails app
            if ($http_user_agent ~ "(Mozilla|Chrome|Safari|Edge|Opera)") {
                return 302 /app/;
            }
            # For API clients or curl, show available services
            add_header Content-Type text/plain;
            return 200 "Available services: /app (Rails), /minio (Storage), /grafana (Dashboards), /prometheus (Metrics), /pgadmin (Database), /mail (Email), /jaeger (Tracing)";
        }
        
        # Handle MinIO static assets requested from root
        location ~ ^/(static/|styles/|images/|Loader\.svg)(.*)$ {
            # Redirect MinIO static assets to proper subpath
            return 302 /minio/$1$2;
        }
        
        # Smart routing for favicon and PWA assets
        location = /favicon.ico {
            # If request is from MinIO context, redirect to MinIO
            if ($http_referer ~ "^https?://[^/]+/minio") {
                return 302 /minio/favicon.ico;
            }
            # Default: redirect to Rails (most common case)
            return 302 /app/favicon.ico;
        }
        
        # Handle other PWA/SPA files that might be requested from root
        location ~ ^/(apple-.*\.png|android-.*\.png|mstile-.*\.png)$ {
            # Try MinIO first for PWA assets
            try_files $uri @minio_assets;
        }
        
        # Fallback for MinIO assets
        location @minio_assets {
            rewrite ^/(.*) /minio/$1 redirect;
        }
    }
}