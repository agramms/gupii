apiVersion: 1

providers:
  - name: 'PSP Dashboards'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/psp
      foldersFromFilesStructure: false
    folder: 'PSP Monitoring'
    folderUid: 'psp-monitoring-folder'