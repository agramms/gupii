# SonarQube Configuration for Gupii PIX Integration

# Project identification
sonar.projectKey=agramms_gupii
sonar.organization=agramms
sonar.projectName=Gupii PIX Integration
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=app,lib,config
sonar.tests=test
sonar.test.inclusions=test/**/*_test.rb,test/**/*_spec.rb

# Exclusions
sonar.exclusions=**/node_modules/**,**/vendor/**,**/tmp/**,**/log/**,db/migrate/**,config/boot.rb,config/environment.rb,config/application.rb,config/environments/**,config/initializers/**

# Coverage configuration
sonar.ruby.coverage.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=test/**/*,db/**/*,config/**/*,app/channels/**/*

# Language-specific settings
sonar.ruby.rubocop.reportPaths=rubocop-report.json

# SCM settings
sonar.scm.provider=git

# Additional settings
sonar.sourceEncoding=UTF-8
sonar.log.level=INFO